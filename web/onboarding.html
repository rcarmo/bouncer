<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncer – Onboarding</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; max-width: 440px; width: 90%; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
  p { color: #666; margin-bottom: 1rem; text-align: center; }
  .note { margin-bottom: 1rem; padding: 0.85rem; background: #fafafa; border-radius: 8px; font-size: 0.9rem; color: #444; }
  .note button { margin-top: 0.5rem; }
  button { background: #111; color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 0.75rem; }
  button:hover { background: #333; }
  button.secondary { background: #666; }
  input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 0.75rem; }
  .name-input { letter-spacing: normal; text-align: left; font-size: 0.95rem; }
  .error { color: #c00; margin-top: 0.5rem; text-align: center; }
  .success { color: #080; margin-top: 0.5rem; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Bouncer Setup</h1>
  <p>Enter the admin code and create your passkey.</p>

  <div id="trust-step" class="note">
    If you see a certificate warning, install the local trust profile once.
    <button onclick="window.location.href='/certs/rootCA.mobileconfig'">📱 Install iOS/macOS Profile</button>
    <button class="secondary" onclick="window.location.href='/certs/rootCA.cer'">💻 Download macOS Certificate</button>
  </div>

  <div id="token-group">
    <input id="token-input" type="text" maxlength="6" pattern="[0-9]{6}" placeholder="Admin code" inputmode="numeric" autocomplete="off">
  </div>
  <input id="name-input" class="name-input" type="text" placeholder="Your name (optional)">
  <button id="register-btn">Create Passkey</button>
  <div id="reg-error" class="error hidden"></div>
  <div id="reg-success" class="success hidden"></div>

  <hr style="margin:1rem 0;border:none;border-top:1px solid #eee;">
  <button class="secondary" onclick="window.location.href='/login'">Already have a passkey? Sign in</button>
</div>

<script type="module">
// Hide trust note in Cloudflare mode.
const cfMeta = document.querySelector('meta[name="cloudflare"]');
if (cfMeta && cfMeta.content === 'true') {
  document.getElementById('trust-step').classList.add('hidden');
}

// Hide token input if local bypass is active (server tells us via meta).
const meta = document.querySelector('meta[name="local-bypass"]');
if (meta && meta.content === 'true') {
  document.getElementById('token-group').classList.add('hidden');
}

document.getElementById('register-btn').addEventListener('click', register);

async function register() {
  const errEl = document.getElementById('reg-error');
  const successEl = document.getElementById('reg-success');
  errEl.classList.add('hidden');
  successEl.classList.add('hidden');

  const token = document.getElementById('token-input').value.trim();
  const name = document.getElementById('name-input').value.trim();

  try {
    const optRes = await fetch('/webauthn/register/options', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, displayName: name || 'User', name: name || '' }),
    });
    if (!optRes.ok) throw new Error(await optRes.text());
    const { options, challengeId, userId } = await optRes.json();

    // Decode base64url fields.
    options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
    options.publicKey.user.id = base64urlToBuffer(options.publicKey.user.id);
    if (options.publicKey.excludeCredentials) {
      options.publicKey.excludeCredentials = options.publicKey.excludeCredentials.map(c => ({
        ...c, id: base64urlToBuffer(c.id)
      }));
    }

    const credential = await navigator.credentials.create({ publicKey: options.publicKey });

    const body = {
      id: credential.id,
      rawId: bufferToBase64url(credential.rawId),
      type: credential.type,
      response: {
        attestationObject: bufferToBase64url(credential.response.attestationObject),
        clientDataJSON: bufferToBase64url(credential.response.clientDataJSON),
      },
    };

    const verRes = await fetch(`/webauthn/register/verify?challengeId=${challengeId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!verRes.ok) throw new Error(await verRes.text());

    successEl.textContent = 'Passkey created! Redirecting...';
    successEl.classList.remove('hidden');
    setTimeout(() => { window.location.href = '/'; }, 1000);
  } catch (e) {
    errEl.textContent = e.message || 'Registration failed';
    errEl.classList.remove('hidden');
  }
}

function base64urlToBuffer(b64url) {
  const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
}
function bufferToBase64url(buf) {
  const bytes = new Uint8Array(buf);
  let b64 = btoa(String.fromCharCode(...bytes));
  return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
</script>
</body>
</html>
